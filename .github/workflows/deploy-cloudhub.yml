name: Deploy to CloudHub 2.0

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
            
      - name: Generate Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build & Test
        run: mvn clean verify --no-transfer-progress
        env:
          MULE_SECURE_KEY: ${{ secrets.MULE_SECURE_KEY }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-app-jar
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: anypoint-exchange-v3
          server-username: ~~~Client~~~
          server-password: ${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-app-jar
          path: target/

      - name: Set short commit SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::5}" >> $GITHUB_ENV

      - name: Deploy to CloudHub 2.0
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
          ANYPOINT_ENV_NAME: ${{ secrets.ANYPOINT_ENV_NAME }}
          MULE_SECURE_KEY: ${{ secrets.MULE_SECURE_KEY }}
          SHORT_SHA: ${{ env.SHORT_SHA }}
        run: |
          mvn deploy -DskipTests \
            -Danypoint.client_id="${ANYPOINT_CLIENT_ID}" \
            -Danypoint.client_secret="${ANYPOINT_CLIENT_SECRET}" \
            -Denvironment="${ANYPOINT_ENV_NAME}" \
            -Dapp.name="sapi-salesforce-implementation-${SHORT_SHA}" \
            -Danypoint.deployment.properties="env=dev,MULE_SECURE_KEY=${MULE_SECURE_KEY}" \
            --no-transfer-progress
